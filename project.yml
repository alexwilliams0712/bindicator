name: Bindicator
options:
  bundleIdPrefix: com.alexwilliams
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: PJKF44SS8H
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  Bindicator:
    type: application
    platform: iOS
    sources:
      - Bindicator
      - Shared
    attributes:
      ProvisioningStyle: Automatic
      DevelopmentTeam: PJKF44SS8H
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexwilliams.Bindicator
        DEVELOPMENT_TEAM: PJKF44SS8H
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_CFBundleDisplayName: Bindicator
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        CODE_SIGN_ENTITLEMENTS: Bindicator/Bindicator.entitlements
    dependencies:
      - target: BinWidgetExtension

  BinWidgetExtension:
    type: app-extension
    platform: iOS
    product: BinWidgetExtension
    sources:
      - path: BinWidget
        excludes:
          - Info.plist
      - Shared
    attributes:
      ProvisioningStyle: Automatic
      DevelopmentTeam: PJKF44SS8H
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexwilliams.Bindicator.Widget
        DEVELOPMENT_TEAM: PJKF44SS8H
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: BinWidget/Info.plist
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_CFBundleDisplayName: Bindicator Widget
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: BinWidget/BinWidgetExtension.entitlements

  BindicatorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BindicatorTests
    dependencies:
      - target: Bindicator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexwilliams.BindicatorTests
        DEVELOPMENT_TEAM: PJKF44SS8H
        GENERATE_INFOPLIST_FILE: true

schemes:
  Bindicator:
    build:
      targets:
        Bindicator: all
        BinWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BindicatorTests
    archive:
      config: Release
